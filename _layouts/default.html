<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{ page.name | remove: ".md" }} | Hirarchealogy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { 
      --sidebar-width: 400px;
      --sidebar-peek: 65px; 
      --right-wave-width: 85px;
      --primary: #2f4f4f; 
      --accent-deep: rgba(100, 0, 20, 0.55); /* 勃艮第红 55% */
      --accent-active: rgba(30, 0, 5, 0.98); 
      --bg-main: #f4f1ea; 
      --card-bg: #ffffff;
    }
    
    * { box-sizing: border-box; }
    body { font-family: "Georgia", "Times New Roman", serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg-main); overflow: hidden; }

    header {
      height: 60px; background: rgba(255,255,255,0.8); backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(0,0,0,0.03); display: flex; align-items: center; padding: 0 30px; z-index: 1000; flex-shrink: 0; justify-content: space-between;
    }
    .header-logo { font-weight: 600; color: var(--primary); font-size: 0.9rem; letter-spacing: 1px; text-decoration: none; }
    .header-nav { display: flex; flex-direction: row; gap: 15px; }
    .header-icon { color: var(--primary); text-decoration: none; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; }
    .header-icon.active { background: var(--primary); color: white; }

    .main-wrapper { display: flex; flex-grow: 1; overflow: hidden; position: relative; }

    /* 4.8 精确花瓶结构侧栏 (口、颈、肩、身) */
    #sidebar-container {
      position: absolute; top: 0; left: 0; height: 100%; z-index: 1500;
      width: var(--sidebar-width);
      /* 强制漏出 65px */
      transform: translateX(calc(-1 * var(--sidebar-width) + var(--sidebar-peek)));
      transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #sidebar-container:hover { transform: translateX(0); }

    #sidebar { 
      width: 100%; height: 100%; background: var(--accent-deep);
      transition: background 0.8s;
      /* 
         SVG 路径详解：
         M-5,0 (左溢出) L25,0 (瓶口撇口)
         C15,5 12,15 12,25 (颈部收缩)
         L12,35 (颈部垂直)
         C12,45 55,50 55,70 (肩部扩张与瓶身饱满)
         C55,90 20,100 20,100 (瓶足内敛)
         L-5,100 Z 
      */
      mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M-5,0 L25,0 C15,5 12,15 12,25 L12,35 C12,45 55,50 55,70 C55,90 20,100 20,100 L-5,100 Z" fill="black"/></svg>');
      -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M-5,0 L25,0 C15,5 12,15 12,25 L12,35 C12,45 55,50 55,70 C55,90 20,100 20,100 L-5,100 Z" fill="black"/></svg>');
      mask-size: 100% 100%; -webkit-mask-size: 100% 100%;
      padding-top: 45vh; padding-left: 30px; padding-right: 60px;
      display: flex; flex-direction: column; justify-content: flex-start;
      box-shadow: 10px 0 30px rgba(0,0,0,0.2);
    }
    #sidebar-container:hover #sidebar { background: var(--accent-active); }

    /* 右侧镜像装饰 (同样强化结构) */
    #right-wave {
      position: fixed; top: 0; right: 0; height: 100%; width: var(--right-wave-width);
      background: rgba(128, 0, 32, 0.08); 
      z-index: 100;
      mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M105,0 L75,0 C85,5 88,15 88,25 L88,35 C88,45 45,50 45,70 C45,90 80,100 80,100 L105,100 Z" fill="black"/></svg>');
      -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M105,0 L75,0 C85,5 88,15 88,25 L88,35 C88,45 45,50 45,70 C45,90 80,100 80,100 L105,100 Z" fill="black"/></svg>');
      -webkit-mask-size: 100% 100%;
      pointer-events: none;
    }

    .nav-item-wrapper {
      display: block; padding: 10px 20px; text-decoration: none;
      color: rgba(255,255,255,0.45); font-size: 14px;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      transform-origin: left center; white-space: nowrap;
    }
    .nav-item-wrapper:hover { color: white; font-size: 18px !important; padding-left: 45px; }
    .nav-item-wrapper.active { color: white; font-weight: bold; font-size: 15px; border-left: 3px solid white; padding-left: 15px; }

    .folder-label { padding: 30px 20px 5px; color: rgba(255,255,255,0.25); font-size: 9px; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; }

    #content-wrapper { flex-grow: 1; overflow-y: auto; padding: 0 var(--right-wave-width) 0 70px; }
    .container { max-width: 850px; margin: 3rem auto; background: var(--card-bg); padding: 5rem 4rem; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border-radius: 2px; }
    
    footer { padding: 4rem 0; text-align: center; color: #bbb; font-size: 0.7rem; letter-spacing: 2px; }
  </style>
</head>
<body>
  <header>
    <a href="{{ site.baseurl }}/" class="header-logo">HIRARCHEALOGY</a>
    <nav class="header-nav">
      <a href="{{ site.baseurl }}/" class="header-icon {% if page.url == '/' %}active{% endif %}" title="Index"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
      <a href="{{ site.baseurl }}/graph.html" class="header-icon {% if page.url contains 'graph' %}active{% endif %}" title="Network"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17 11c.34 0 .66.08.95.22l2.64-2.64A3.962 3.962 0 0 0 21 5c0-2.21-1.79-4-4-4-2.21 0-4 1.79-4 4 0 .34.08.66.22.95L10.58 8.59a3.96 3.96 0 0 0-1.16-.59V5c0-2.21-1.79-4-4-4S1.42 2.79 1.42 5c0 2.21 1.79 4 4 4 .4 0 .78-.07 1.14-.2l2.66 2.66c-.14.28-.22.6-.22.94s.08.66.22.95l-2.66 2.66a3.96 3.96 0 0 0-1.14-.2c-2.21 0-4 1.79-4 4 0 2.21 1.79 4 4 4 2.21 0 4-1.79 4-4 0-.34-.08-.66-.22-.95l2.64-2.64c.29.14.61.22.95.22 2.21 0 4-1.79 4-4s-1.79-4-4-4zm-8-2c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0 12c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm8-6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0-8c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg></a>
    </nav>
  </header>

  <div class="main-wrapper">
    <div id="right-wave"></div>
    <div id="sidebar-container">
      <aside id="sidebar"><div id="tree-root"></div></aside>
    </div>
    <div id="content-wrapper">
      <main class="container">
        <div id="markdown-body">
          <h1>{{ page.name | remove: ".md" }}</h1>
          {{ content }}
        </div>
      </main>
      <footer>EXPLORE THE LAYERS</footer>
    </div>
  </div>

  <script>
    function clean(str) { return str ? str.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, "").trim() : ""; }

    const pages = [{% for p in site.pages %}{% if p.path contains "docs/" %}{ "path": {{ p.path | jsonify }}, "url": {{ p.url | relative_url | jsonify }}, "name": clean({{ p.name | remove: ".md" | jsonify }}) },{% endif %}{% endfor %}];
    const currentUrl = {{ page.url | relative_url | jsonify }};

    function renderTree() {
      const root = {};
      pages.forEach(p => {
        const parts = p.path.split("/").slice(1);
        let cur = root;
        parts.forEach((part, i) => {
          const name = clean(part);
          if (i === parts.length - 1) cur[name] = p;
          else { if (!cur[name]) cur[name] = {}; cur = cur[name]; }
        });
      });

      const container = document.getElementById('tree-root');
      function build(obj, parent) {
        Object.keys(obj).sort().forEach(key => {
          const val = obj[key];
          if (val.url) {
            const a = document.createElement('a');
            a.href = val.url;
            a.className = 'nav-item-wrapper' + (val.url === currentUrl ? ' active' : '');
            a.innerText = clean(val.name);
            parent.appendChild(a);
          } else {
            const label = document.createElement('div');
            label.style = "padding: 25px 40px 5px; color:rgba(255,255,255,0.25); font-size:9px; font-weight:bold; text-transform:uppercase; letter-spacing:3px;";
            label.innerText = clean(key);
            parent.appendChild(label);
            const sub = document.createElement('div');
            parent.appendChild(sub);
            build(val, sub);
          }
        });
      }
      build(root, container);
    }
    renderTree();

    const md = document.getElementById('markdown-body');
    md.innerHTML = clean(md.innerHTML)
      .replace(/\[\[(.*?)\]\]/g, (m, c) => {
        let [t, l] = c.split('|'); let target = clean(t.split('#')[0]);
        const f = pages.find(p => clean(p.name) === target);
        return f ? `<a class="wikilink" href="${f.url}">${l || target}</a>` : `<span style="color:#999">[[${c}]]</span>`;
      });
  </script>
</body>
</html>
