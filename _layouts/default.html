<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{ page.name | remove: ".md" }} | Hirarchealogy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* 2.0 深度考古配色：勃艮第、墨影与沙砾 */
    :root { 
      --sidebar-width: 380px;
      --sidebar-peek: 45px; 
      --right-wave-width: 80px;
      --header-height: 60px;
      --primary: #1a1a1a; /* 墨色 */
      --accent: #800020;  /* 勃艮第红 */
      --bg-main: #f0ede4; /* 稍微加深的沙砾色 */
      --card-bg: #ffffff;
      --text-main: #2c2c2c;
    }
    
    * { box-sizing: border-box; }
    body { font-family: "Georgia", "Times New Roman", serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg-main); overflow: hidden; }

    header {
      height: 60px; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(128,0,32,0.1); display: flex; align-items: center; padding: 0 30px; z-index: 2000; flex-shrink: 0; justify-content: space-between;
    }
    .header-logo { font-weight: 600; color: var(--accent); font-size: 0.9rem; letter-spacing: 2px; text-decoration: none; }
    .header-icon { color: #666; text-decoration: none; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; transition: 0.3s; }
    .header-icon:hover { background: var(--bg-main); color: var(--accent); }
    .header-icon.active { background: var(--accent); color: white; }

    .main-wrapper { display: flex; flex-grow: 1; overflow: hidden; position: relative; }

    /* 探索球体美化：增加立体感 */
    .portal-orb {
      width: 220px; height: 220px; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff, #f8f8f8);
      border: 1px solid #e0dbd0;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      cursor: pointer; transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.05), inset 0 -5px 15px rgba(0,0,0,0.02);
      text-decoration: none !important; position: relative;
    }
    .portal-orb:hover {
      transform: translateY(-20px) scale(1.05);
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 30px 60px rgba(128,0,32,0.25);
    }
    .portal-title { color: var(--accent); font-size: 1.3rem; font-weight: 600; letter-spacing: 3px; transition: 0.4s; }
    .portal-desc { color: #999; font-size: 0.7rem; margin-top: 12px; letter-spacing: 1px; opacity: 0; transition: 0.4s; }
    .portal-orb:hover .portal-title, .portal-orb:hover .portal-desc { color: white; opacity: 1; }

    /* 侧栏：深色花瓶 */
    #sidebar-container {
      position: absolute; top: 0; left: 0; height: 100%; z-index: 1500;
      width: var(--sidebar-width);
      transform: translateX(calc(-1 * var(--sidebar-width) + var(--sidebar-peek)));
      transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      background: rgba(26, 26, 26, 0.95);
      mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L15,0 C5,10 5,20 10,30 C20,40 45,45 45,65 C45,85 20,95 15,100 L0,100 Z" fill="black"/></svg>');
      -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L15,0 C5,10 5,20 10,30 C20,40 45,45 45,65 C45,85 20,95 15,100 L0,100 Z" fill="black"/></svg>');
      -webkit-mask-size: 100% 100%;
    }
    #sidebar-container:hover { transform: translateX(0); background: #000; }
    #sidebar { padding-top: 45vh; padding-left: 30px; }
    .nav-item-wrapper { display: block; padding: 10px 20px; text-decoration: none; color: #666; font-size: 14px; transition: 0.4s; }
    .nav-item-wrapper:hover { color: white; font-size: 18px !important; }

    /* 内容区：卡片悬浮感 */
    #content-wrapper { flex-grow: 1; overflow-y: auto; padding: 0 var(--right-wave-width) 0 60px; scroll-behavior: smooth; }
    .container { 
      max-width: 850px; margin: 4rem auto; 
      background: var(--card-bg); padding: 6rem 5rem; 
      box-shadow: 0 20px 80px rgba(0,0,0,0.06); /* 增强层级深度 */
      border-radius: 2px;
    }
    
    #right-wave {
      position: fixed; top: var(--header-height); right: 0; height: calc(100% - var(--header-height)); 
      width: var(--right-wave-width); background: rgba(128, 0, 32, 0.08); z-index: 100;
      mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M100,0 L75,0 C65,5 95,10 90,20 C80,35 25,35 25,45 C25,55 65,55 60,65 C40,80 0,80 0,85 C0,95 50,100 70,100 L100,100 Z" fill="black"/></svg>');
      -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M100,0 L75,0 C65,5 95,10 90,20 C80,35 25,35 25,45 C25,55 65,55 60,65 C40,80 0,80 0,85 C0,95 50,100 70,100 L100,100 Z" fill="black"/></svg>');
      -webkit-mask-size: 100% 100%; pointer-events: none;
    }

    footer { padding: 6rem 0; text-align: center; color: #aaa; font-size: 0.7rem; letter-spacing: 3px; }
  </style>
</head>
<body>
  <header>
    <a href="{{ site.baseurl }}/" class="header-logo">HIRARCHEALOGY</a>
    <nav class="header-nav">
      <a href="{{ site.baseurl }}/" class="header-icon {% if page.url == '/' %}active{% endif %}" title="Index"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
      <a href="{{ site.baseurl }}/graph.html" class="header-icon {% if page.url contains 'graph' %}active{% endif %}" title="Network"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17 11c.34 0 .66.08.95.22l2.64-2.64A3.962 3.962 0 0 0 21 5c0-2.21-1.79-4-4-4-2.21 0-4 1.79-4 4 0 .34.08.66.22.95L10.58 8.59a3.96 3.96 0 0 0-1.16-.59V5c0-2.21-1.79-4-4-4S1.42 2.79 1.42 5c0 2.21 1.79 4 4 4 .4 0 .78-.07 1.14-.2l2.66 2.66c-.14.28-.22.6-.22.94s.08.66.22.95l-2.66 2.66a3.96 3.96 0 0 0-1.14-.2c-2.21 0-4 1.79-4 4 0 2.21 1.79 4 4 4 2.21 0 4-1.79 4-4 0-.34-.08-.66-.22-.95l2.64-2.64c.29.14.61.22.95.22 2.21 0 4-1.79 4-4s-1.79-4-4-4zm-8-2c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0 12c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm8-6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0-8c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg></a>
    </nav>
  </header>

  <div class="main-wrapper">
    <div id="right-wave"></div>
    <div id="sidebar-container"><aside id="sidebar"><div id="tree-root"></div></aside></div>
    <div id="content-wrapper">
      <main class="container">
        <div id="markdown-body">
          {% if page.url != "/" %}<h1>{{ page.name | remove: ".md" }}</h1>{% endif %}
          {{ content }}
        </div>
      </main>
      <footer>HIRARCHEALOGY &copy; {{ site.time | date: "%Y" }}</footer>
    </div>
  </div>

  <script>
    function clean(str) { return str ? str.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, "").trim() : ""; }
    const pages = [{% for p in site.pages %}{% if p.path contains "docs/" %}{ "path": {{ p.path | jsonify }}, "url": {{ p.url | relative_url | jsonify }}, "name": clean({{ p.name | remove: ".md" | jsonify }}) },{% endif %}{% endfor %}];
    const currentUrl = {{ page.url | relative_url | jsonify }};
    
    function renderTree() {
      const root = {};
      pages.forEach(p => {
        const parts = p.path.split("/").slice(1);
        let cur = root;
        parts.forEach((part, i) => {
          const name = clean(part);
          if (i === parts.length - 1) cur[name] = p;
          else { if (!cur[name]) cur[name] = {}; cur = cur[name]; }
        });
      });
      const tr = document.getElementById('tree-root');
      function build(obj, parent) {
        Object.keys(obj).sort().forEach(key => {
          const val = obj[key];
          if (val.url) {
            const a = document.createElement('a'); a.href = val.url;
            a.className = 'nav-item-wrapper' + (val.url === currentUrl ? ' active' : '');
            a.innerText = clean(val.name); parent.appendChild(a);
          }
        });
      }
      build(root, tr);
    }
    renderTree();

    const md = document.getElementById('markdown-body');
    md.innerHTML = md.innerHTML.replace(/\[\[(.*?)\]\]/g, (m, c) => {
      let [t, l] = c.split('|'); let target = clean(t.split('#')[0]);
      const f = pages.find(p => clean(p.name) === target);
      return f ? `<a style="color:var(--accent); text-decoration:none; border-bottom:1px solid rgba(128,0,32,0.2);" href="${f.url}">${l || target}</a>` : `<span style="color:#999">[[${c}]]</span>`;
    });
  </script>
</body>
</html>
