<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{ page.name | remove: ".md" }} | Hirarchealogy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* 3.0 时尚考古风格：沙砾、白瓷与墨青 */
    :root { 
      --sidebar-width: 280px; 
      --header-height: 60px;
      --primary: #2f4f4f; /* 墨青色：专业且时尚 */
      --accent: #800020;  /* 勃艮第红：点睛之笔 */
      --bg-main: #f4f1ea; /* 沙砾色背景：高级质感 */
      --card-bg: #ffffff;
      --sidebar-bg: #1a1a1a; /* 深色侧栏：与主内容拉开对比 */
      --text-main: #333333;
      --text-soft: #666666;
    }
    
    * { box-sizing: border-box; }
    body { font-family: "Georgia", "Times New Roman", "PingFang SC", serif; margin: 0; display: flex; flex-direction: column; height: 100vh; font-size: 16px; line-height: 1.8; color: var(--text-main); background: var(--bg-main); overflow: hidden; }

    /* 开屏页升级：更高级的渐变 */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9999; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.8s cubic-bezier(0.77, 0, 0.175, 1);
    }
    #splash-screen.hidden { transform: scale(1.1); opacity: 0; pointer-events: none; }
    .splash-hint { color: white; font-size: 0.9rem; letter-spacing: 4px; font-family: sans-serif; opacity: 0.7; }

    /* 顶栏：悬浮质感 */
    header {
      height: var(--header-height); background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      display: flex; align-items: center; padding: 0 30px; z-index: 1000; flex-shrink: 0;
      justify-content: space-between;
    }
    .menu-toggle { cursor: pointer; color: var(--primary); font-size: 1.5rem; transition: 0.3s; }
    .menu-toggle:hover { transform: rotate(90deg); color: var(--accent); }
    
    .header-nav { display: flex; gap: 20px; align-items: center; }
    .header-icon { color: var(--primary); text-decoration: none; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; transition: 0.3s; }
    .header-icon:hover { background: var(--bg-main); transform: scale(1.1); }
    .header-icon.active { background: var(--primary); color: white; }
    .header-icon svg { width: 22px; height: 22px; fill: currentColor; }

    .main-wrapper { display: flex; flex-grow: 1; overflow: hidden; }

    /* 深色时尚侧栏 */
    #sidebar { 
      width: var(--sidebar-width); background: var(--sidebar-bg); 
      overflow-y: auto; padding: 2rem 0; flex-shrink: 0; font-size: 14px;
      transition: margin-left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #sidebar.hidden { margin-left: calc(-1 * var(--sidebar-width)); }
    
    .folder-header { cursor: pointer; padding: 10px 20px; color: #999; font-weight: 600; display: flex; align-items: center; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; }
    .folder-header:hover { color: white; }
    .folder-header::before { content: "●"; margin-right: 12px; font-size: 0.5rem; color: var(--accent); }
    
    .folder-content { display: none; padding-left: 20px; margin-bottom: 10px; }
    .folder-content.show { display: block; }
    
    .tree-item { display: block; padding: 6px 20px; color: #ccc; text-decoration: none; border-radius: 0; transition: 0.3s; border-left: 3px solid transparent; }
    .tree-item:hover { color: white; background: rgba(255,255,255,0.05); border-left-color: var(--accent); }
    .tree-item.active { color: white; background: rgba(255,255,255,0.1); border-left-color: var(--accent); font-weight: bold; }

    /* 主内容区：卡片式排版 */
    #content-wrapper { flex-grow: 1; overflow-y: auto; position: relative; }
    .container { 
      max-width: 900px; margin: 4rem auto; 
      background: var(--card-bg); padding: 5rem 4rem; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.04);
      border-radius: 2px; /* 近似书籍的直角感 */
    }
    
    #markdown-body h1 { font-size: 2.2rem; color: var(--primary); margin-bottom: 3rem; text-align: center; font-style: italic; }
    #markdown-body h2 { font-size: 1.8rem; border-bottom: 1px solid var(--bg-main); padding-bottom: 10px; margin-top: 4rem; color: var(--primary); }
    #markdown-body p { color: #444; margin-bottom: 2rem; font-size: 1rem; }
    
    .wikilink { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(128,0,32,0.2); }
    .wikilink:hover { background: #fff5f5; border-bottom-color: var(--accent); }

    .floating-nav { position: fixed; right: 40px; bottom: 40px; display: flex; flex-direction: column; gap: 15px; }
    .nav-btn { width: 50px; height: 50px; background: var(--primary); color: white; border-radius: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s; }
    .nav-btn:hover { background: var(--accent); transform: scale(1.1); }

    footer { padding: 6rem 0; text-align: center; color: #999; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
  </style>
</head>
<body>
  <div id="splash-screen">
    <div class="splash-hint">EXPLORE THE DEPTHS</div>
  </div>

  <header>
    <div class="header-left">
      <div class="menu-toggle" id="toggle-btn">☰</div>
    </div>
    <nav class="header-nav">
      <a href="{{ site.baseurl }}/" class="header-icon {% if page.url == '/' %}active{% endif %}" title="Index">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </a>
      <a href="{{ site.baseurl }}/graph.html" class="header-icon {% if page.url contains 'graph' %}active{% endif %}" title="Network">
        <svg viewBox="0 0 24 24"><path d="M17 11c.34 0 .66.08.95.22l2.64-2.64A3.962 3.962 0 0 0 21 5c0-2.21-1.79-4-4-4-2.21 0-4 1.79-4 4 0 .34.08.66.22.95L10.58 8.59a3.96 3.96 0 0 0-1.16-.59V5c0-2.21-1.79-4-4-4S1.42 2.79 1.42 5c0 2.21 1.79 4 4 4 .4 0 .78-.07 1.14-.2l2.66 2.66c-.14.28-.22.6-.22.94s.08.66.22.95l-2.66 2.66a3.96 3.96 0 0 0-1.14-.2c-2.21 0-4 1.79-4 4 0 2.21 1.79 4 4 4 2.21 0 4-1.79 4-4 0-.34-.08-.66-.22-.95l2.64-2.64c.29.14.61.22.95.22 2.21 0 4-1.79 4-4s-1.79-4-4-4zm-8-2c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0 12c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm8-6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0-8c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
      </a>
    </nav>
  </header>

  <div class="main-wrapper">
    <aside id="sidebar"><div id="tree-root"></div></aside>
    <div id="content-wrapper">
      <div class="floating-nav">
        <div class="nav-btn" onclick="window.history.back()">←</div>
        <div class="nav-btn" onclick="document.getElementById('content-wrapper').scrollTo({top:0, behavior:'smooth'})">↑</div>
      </div>
      <main class="container"><div id="markdown-body">{{ content }}</div></main>
      <footer>HIRARCHEALOGY &copy; {{ site.time | date: "%Y" }}</footer>
    </div>
  </div>

  <script>
    function clean(str) { return str ? str.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, "").trim() : ""; }

    // 开屏逻辑
    const splash = document.getElementById('splash-screen');
    const colors = [['#2f4f4f', '#1a1a1a'], ['#800020', '#2d0000'], ['#4a5568', '#1a202c']];
    const rand = colors[Math.floor(Math.random() * colors.length)];
    splash.style.background = `linear-gradient(135deg, ${rand[0]}, ${rand[1]})`;
    splash.onclick = () => { splash.classList.add('hidden'); sessionStorage.setItem('hi_splashed', 'true'); };
    if(sessionStorage.getItem('hi_splashed') === 'true') splash.style.display = 'none';

    // 侧边栏
    const sidebar = document.getElementById('sidebar');
    window.toggleSidebar = (show) => {
      if (show === undefined) sidebar.classList.toggle('hidden');
      else show ? sidebar.classList.remove('hidden') : sidebar.classList.add('hidden');
    };
    document.getElementById('toggle-btn').onclick = () => window.toggleSidebar();
    if (window.location.pathname.includes("graph")) window.toggleSidebar(false);

    const pages = [{% for p in site.pages %}{% if p.path contains "docs/" %}{ "path": {{ p.path | jsonify }}, "url": {{ p.url | relative_url | jsonify }}, "name": clean({{ p.name | remove: ".md" | jsonify }}) },{% endif %}{% endfor %}];
    const currentUrl = {{ page.url | relative_url | jsonify }};

    function renderTree() {
      const root = {};
      pages.forEach(p => {
        const parts = p.path.split("/").slice(1);
        let cur = root;
        parts.forEach((part, i) => {
          const name = clean(part);
          if (i === parts.length - 1) cur[name] = p;
          else { if (!cur[name]) cur[name] = {}; cur = cur[name]; }
        });
      });
      const container = document.getElementById('tree-root');
      function build(obj, parent) {
        Object.keys(obj).sort().forEach(key => {
          const val = obj[key];
          if (val.url) {
            const a = document.createElement('a');
            a.href = val.url; a.className = 'tree-item' + (val.url === currentUrl ? ' active' : '');
            a.innerText = clean(val.name); parent.appendChild(a);
          } else {
            const div = document.createElement('div');
            const head = document.createElement('div'); head.className = 'folder-header'; head.innerText = clean(key);
            const body = document.createElement('div'); body.className = 'folder-content';
            head.onclick = () => { head.classList.toggle('open'); body.classList.toggle('show'); };
            div.appendChild(head); div.appendChild(body); parent.appendChild(div);
            build(val, body);
            if (body.querySelector('.active')) { head.classList.add('open'); body.classList.add('show'); }
          }
        });
      }
      build(root, container);
    }
    renderTree();

    const md = document.getElementById('markdown-body');
    md.innerHTML = clean(md.innerHTML)
      .replace(/(^|\s)#([\u4e00-\u9fa5\w\/]+)(?=\s|$)/g, '$1<span class="content-tag">#$2</span>')
      .replace(/\[\[(.*?)\]\]/g, (m, c) => {
        let [t, l] = c.split('|'); let target = clean(t.split('#')[0]);
        const f = pages.find(p => clean(p.name) === target);
        return f ? `<a class="wikilink" href="${f.url}">${l || target}</a>` : `<span style="color:#999">[[${c}]]</span>`;
      });
  </script>
</body>
</html>
