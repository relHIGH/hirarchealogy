<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{ page.name | remove: ".md" }} | Hirarchealogy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { 
      --sidebar-width: 380px;
      --sidebar-peek: 55px; 
      --right-wave-width: 80px;
      --header-height: 60px;
      --primary: #2f4f4f; 
      --accent-deep: rgba(100, 0, 20, 0.65); 
      --accent-active: rgba(30, 0, 5, 0.98); 
      --bg-main: #f4f1ea; 
      --card-bg: #ffffff;
    }
    
    * { box-sizing: border-box; }
    body { font-family: "Georgia", "Times New Roman", serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg-main); overflow: hidden; }

    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9999; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.8s cubic-bezier(0.77, 0, 0.175, 1);
      background: linear-gradient(135deg, #800020, #1a1a1a);
    }
    #splash-screen.hidden { transform: scale(1.1); opacity: 0; pointer-events: none; }
    .splash-hint { color: white; font-size: 0.9rem; letter-spacing: 4px; font-family: sans-serif; opacity: 0.7; }

    header {
      height: 60px; background: rgba(255,255,255,0.8); backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(0,0,0,0.03); display: flex; align-items: center; padding: 0 30px; z-index: 2000; flex-shrink: 0; justify-content: space-between;
    }
    .header-logo { font-weight: 600; color: var(--primary); font-size: 0.9rem; letter-spacing: 1px; text-decoration: none; }
    .header-nav { display: flex; flex-direction: row !important; gap: 15px; align-items: center; }
    .header-icon { color: var(--primary); text-decoration: none; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; }
    .header-icon.active { background: var(--primary); color: white; }

    .main-wrapper { display: flex; flex-grow: 1; overflow: hidden; position: relative; }

    /* 5.6 智能记忆侧栏 */
    #sidebar-container {
      position: absolute; top: 0; left: 0; height: 100%; z-index: 1500;
      width: var(--sidebar-width);
      /* 初始状态由 JS 动态注入样式 */
      transform: translateX(calc(-1 * var(--sidebar-width) + var(--sidebar-peek)));
      transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), background 0.8s;
      background: var(--accent-deep);
      mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L15,0 L15,40 C15,55 100,50 100,75 C100,95 40,100 20,100 L0,100 Z" fill="black"/></svg>');
      -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L15,0 L15,40 C15,55 100,50 100,75 C100,95 40,100 20,100 L0,100 Z" fill="black"/></svg>');
      -webkit-mask-size: 100% 100%;
    }
    /* 仅在非跳转即显时应用过渡 */
    #sidebar-container.ready { transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), background 0.8s; }

    #sidebar { 
      width: 100%; height: 100%;
      padding-top: 55vh; padding-left: 30px; padding-right: 60px;
      display: flex; flex-direction: column; justify-content: flex-start;
    }

    #right-wave {
      position: fixed; top: var(--header-height); right: 0; height: calc(100% - var(--header-height)); 
      width: 80px; background: rgba(128, 0, 32, 0.08); z-index: 100;
      mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M100,0 L75,0 C65,5 95,10 90,20 C80,35 25,35 25,45 C25,55 65,55 60,65 C40,80 0,80 0,85 C0,95 50,100 70,100 L100,100 Z" fill="black"/></svg>');
      -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M100,0 L75,0 C65,5 95,10 90,20 C80,35 25,35 25,45 C25,55 65,55 60,65 C40,80 0,80 0,85 C0,95 50,100 70,100 L100,100 Z" fill="black"/></svg>');
      -webkit-mask-size: 100% 100%; pointer-events: none;
    }

    .nav-item-wrapper {
      display: block; padding: 10px 20px; text-decoration: none;
      color: rgba(255,255,255,0.4); font-size: 14px;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      transform-origin: left center; white-space: nowrap;
    }
    .nav-item-wrapper:hover { color: white; font-size: 18px !important; padding-left: 40px; }
    .nav-item-wrapper.active { color: white; font-weight: bold; font-size: 15px; border-left: 3px solid white; padding-left: 15px; }

    #content-wrapper { flex-grow: 1; overflow-y: auto; padding: 0 var(--right-wave-width) 0 60px; }
    .container { max-width: 850px; margin: 3rem auto; background: var(--card-bg); padding: 5rem 4rem; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border-radius: 2px; }
    footer { padding: 4rem 0; text-align: center; color: #bbb; font-size: 0.7rem; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div id="splash-screen"><div class="splash-hint">EXPLORE THE DEPTHS</div></div>

  <header>
    <div style="font-weight: 600; color: var(--primary); font-size: 0.9rem; letter-spacing: 1px;">HIRARCHEALOGY</div>
    <nav class="header-nav">
      <a href="{{ site.baseurl }}/" class="header-icon {% if page.url == '/' %}active{% endif %}" title="Index"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
      <a href="{{ site.baseurl }}/graph.html" class="header-icon {% if page.url contains 'graph' %}active{% endif %}" title="Network"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17 11c.34 0 .66.08.95.22l2.64-2.64A3.962 3.962 0 0 0 21 5c0-2.21-1.79-4-4-4-2.21 0-4 1.79-4 4 0 .34.08.66.22.95L10.58 8.59a3.96 3.96 0 0 0-1.16-.59V5c0-2.21-1.79-4-4-4S1.42 2.79 1.42 5c0 2.21 1.79 4 4 4 .4 0 .78-.07 1.14-.2l2.66 2.66c-.14.28-.22.6-.22.94s.08.66.22.95l-2.66 2.66a3.96 3.96 0 0 0-1.14-.2c-2.21 0-4 1.79-4 4 0 2.21 1.79 4 4 4 2.21 0 4-1.79 4-4 0-.34-.08-.66-.22-.95l2.64-2.64c.29.14.61.22.95.22 2.21 0 4-1.79 4-4s-1.79-4-4-4zm-8-2c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0 12c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm8-6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0-8c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg></a>
    </nav>
  </header>

  <div class="main-wrapper">
    <div id="right-wave"></div>
    <div id="sidebar-container">
      <aside id="sidebar"><div id="tree-root"></div></aside>
    </div>
    <div id="content-wrapper">
      <main class="container">
        <div id="markdown-body">
          <h1>{{ page.name | remove: ".md" }}</h1>
          {{ content }}
        </div>
      </main>
      <footer>EXPLORE THE LAYERS</footer>
    </div>
  </div>

  <script>
    function clean(str) { return str ? str.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, "").trim() : ""; }

    const container = document.getElementById('sidebar-container');
    
    // 1. 侧栏智能状态管理
    const isGraph = window.location.pathname.includes("graph");
    
    if (!isGraph) {
      container.onmouseenter = () => {
        container.style.transform = 'translateX(0)';
        container.style.background = 'var(--accent-active)';
        sessionStorage.setItem('sidebar_open', 'true');
      };
      container.onmouseleave = () => {
        container.style.transform = 'translateX(calc(-1 * var(--sidebar-width) + var(--sidebar-peek)))';
        container.style.background = 'var(--accent-deep)';
        sessionStorage.setItem('sidebar_open', 'false');
      };

      // 恢复状态：如果之前是打开的，新页面直接显示打开，避免闪烁
      if (sessionStorage.getItem('sidebar_open') === 'true') {
        container.style.transition = 'none'; // 瞬间恢复
        container.style.transform = 'translateX(0)';
        container.style.background = 'var(--accent-active)';
        setTimeout(() => { container.style.transition = ''; }, 100);
      }
    }

    // 2. 开屏逻辑
    const splash = document.getElementById('splash-screen');
    splash.onclick = () => { splash.classList.add('hidden'); sessionStorage.setItem('hi_splashed', 'true'); };
    if(sessionStorage.getItem('hi_splashed') === 'true' && window.location.pathname !== "{{ site.baseurl }}/") {
      splash.style.display = 'none';
    }

    const pages = [{% for p in site.pages %}{% if p.path contains "docs/" %}{ "path": {{ p.path | jsonify }}, "url": {{ p.url | relative_url | jsonify }}, "name": clean({{ p.name | remove: ".md" | jsonify }}) },{% endif %}{% endfor %}];
    const currentUrl = {{ page.url | relative_url | jsonify }};

    function renderTree() {
      const root = {};
      pages.forEach(p => {
        const parts = p.path.split("/").slice(1);
        let cur = root;
        parts.forEach((part, i) => {
          const name = clean(part);
          if (i === parts.length - 1) cur[name] = p;
          else { if (!cur[name]) cur[name] = {}; cur = cur[name]; }
        });
      });
      const tr = document.getElementById('tree-root');
      function build(obj, parent) {
        Object.keys(obj).sort().forEach(key => {
          const val = obj[key];
          if (val.url) {
            const a = document.createElement('a'); a.href = val.url;
            a.className = 'nav-item-wrapper' + (val.url === currentUrl ? ' active' : '');
            a.innerText = clean(val.name); parent.appendChild(a);
          } else {
            const label = document.createElement('div'); label.style = "padding: 25px 40px 5px; color:rgba(255,255,255,0.25); font-size:9px; font-weight:bold; text-transform:uppercase; letter-spacing:3px;";
            label.innerText = clean(key); parent.appendChild(label);
            const sub = document.createElement('div'); parent.appendChild(sub); build(val, sub);
          }
        });
      }
      build(root, tr);
    }
    renderTree();

    const md = document.getElementById('markdown-body');
    md.innerHTML = clean(md.innerHTML).replace(/\[\[(.*?)\]\]/g, (m, c) => {
      let [t, l] = c.split('|'); let target = clean(t.split('#')[0]);
      const f = pages.find(p => clean(p.name) === target);
      return f ? `<a class="wikilink" href="${f.url}">${l || target}</a>` : `<span style="color:#999">[[${c}]]</span>`;
    });
  </script>
</body>
</html>
