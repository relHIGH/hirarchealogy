<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{ page.name | remove: ".md" }} | Hirarchealogy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { 
      --sidebar-width: 260px;
      --header-height: 60px;
      --primary: #2f4f4f; 
      --accent: #800020;  
      --bg-main: #f4f1ea; 
      --card-bg: #ffffff;
    }
    
    * { box-sizing: border-box; }
    body { font-family: "Georgia", serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg-main); overflow: hidden; }

    /* 顶栏 */
    header {
      height: var(--header-height); background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; padding: 0 30px; z-index: 1000; flex-shrink: 0; justify-content: space-between;
    }
    .header-logo { font-weight: 600; color: var(--primary); font-size: 0.9rem; letter-spacing: 1px; text-decoration: none; }
    
    /* 修复横向布局 */
    .header-nav { display: flex !important; flex-direction: row !important; gap: 15px; align-items: center; }
    .header-icon { color: var(--primary); text-decoration: none; display: flex; align-items: center; justify-content: center; width: 38px; height: 36px; border-radius: 50%; transition: 0.3s; }
    .header-icon:hover { background: rgba(0,0,0,0.05); }
    .header-icon.active { background: var(--primary); color: white; }
    .header-icon svg { width: 20px; height: 20px; fill: currentColor; }

    .main-wrapper { display: flex; flex-grow: 1; overflow: hidden; }

    /* 3.4 毛玻璃弧形侧栏 */
    #sidebar { 
      width: var(--sidebar-width); 
      background: rgba(255,255,255,0.4); /* 半透明底色 */
      backdrop-filter: blur(15px); /* 毛玻璃效果 */
      -webkit-backdrop-filter: blur(15px);
      overflow-y: auto; overflow-x: hidden; padding: 2rem 0; flex-shrink: 0;
      border-right: 1px solid rgba(255,255,255,0.3);
      border-radius: 0 60px 60px 0;
      height: fit-content;
      align-self: flex-start;
      margin-top: 2rem;
      box-shadow: 10px 0 30px rgba(0,0,0,0.02);
    }

    .nav-item-wrapper {
      display: flex; align-items: center; cursor: pointer;
      height: 42px; padding: 0 25px; text-decoration: none;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      color: #555;
      border-radius: 0 30px 30px 0;
    }
    
    .nav-item-wrapper:hover {
      background: var(--primary);
      color: white;
      transform: scale(1.03);
      padding-left: 35px;
    }
    
    .nav-item-wrapper.active {
      background: rgba(47, 79, 79, 0.1);
      color: var(--primary);
      font-weight: bold;
      border-left: 4px solid var(--primary);
    }

    .folder-label {
      padding: 15px 25px 5px; color: var(--primary); font-size: 0.7rem; font-weight: bold;
      text-transform: uppercase; letter-spacing: 2px; opacity: 0.5;
    }

    #content-wrapper { flex-grow: 1; overflow-y: auto; }
    .container { max-width: 850px; margin: 3rem auto; background: var(--card-bg); padding: 5rem 4rem; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border-radius: 2px; }
    #markdown-body h1 { font-size: 2.2rem; color: var(--primary); margin-bottom: 2rem; text-align: center; }
    
    footer { padding: 4rem 0; text-align: center; color: #bbb; font-size: 0.7rem; letter-spacing: 2px; }
  </style>
</head>
<body>
  <header>
    <a href="{{ site.baseurl }}/" class="header-logo">HIRARCHEALOGY</a>
    <nav class="header-nav">
      <a href="{{ site.baseurl }}/" class="header-icon {% if page.url == '/' %}active{% endif %}" title="Index"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
      <a href="{{ site.baseurl }}/graph.html" class="header-icon {% if page.url contains 'graph' %}active{% endif %}" title="Network"><svg viewBox="0 0 24 24"><path d="M17 11c.34 0 .66.08.95.22l2.64-2.64A3.962 3.962 0 0 0 21 5c0-2.21-1.79-4-4-4-2.21 0-4 1.79-4 4 0 .34.08.66.22.95L10.58 8.59a3.96 3.96 0 0 0-1.16-.59V5c0-2.21-1.79-4-4-4S1.42 2.79 1.42 5c0 2.21 1.79 4 4 4 .4 0 .78-.07 1.14-.2l2.66 2.66c-.14.28-.22.6-.22.94s.08.66.22.95l-2.66 2.66a3.96 3.96 0 0 0-1.14-.2c-2.21 0-4 1.79-4 4 0 2.21 1.79 4 4 4 2.21 0 4-1.79 4-4 0-.34-.08-.66-.22-.95l2.64-2.64c.29.14.61.22.95.22 2.21 0 4-1.79 4-4s-1.79-4-4-4zm-8-2c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0 12c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm8-6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0-8c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg></a>
    </nav>
  </header>

  <div class="main-wrapper">
    <aside id="sidebar"><div id="tree-root"></div></aside>
    <div id="content-wrapper">
      <main class="container">
        <div id="markdown-body">
          <h1>{{ page.name | remove: ".md" }}</h1>
          {{ content }}
        </div>
      </main>
      <footer>EXPLORE THE LAYERS</footer>
    </div>
  </div>

  <script>
    function clean(str) { return str ? str.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, "").trim() : ""; }

    const pages = [{% for p in site.pages %}{% if p.path contains "docs/" %}{ "path": {{ p.path | jsonify }}, "url": {{ p.url | relative_url | jsonify }}, "name": clean({{ p.name | remove: ".md" | jsonify }}) },{% endif %}{% endfor %}];
    const currentUrl = {{ page.url | relative_url | jsonify }};

    function renderTree() {
      const root = {};
      pages.forEach(p => {
        const parts = p.path.split("/").slice(1);
        let cur = root;
        parts.forEach((part, i) => {
          const name = clean(part);
          if (i === parts.length - 1) cur[name] = p;
          else { if (!cur[name]) cur[name] = {}; cur = cur[name]; }
        });
      });

      const container = document.getElementById('tree-root');
      function build(obj, parent) {
        Object.keys(obj).sort().forEach(key => {
          const val = obj[key];
          if (val.url) {
            const a = document.createElement('a');
            a.href = val.url;
            a.className = 'nav-item-wrapper' + (val.url === currentUrl ? ' active' : '');
            a.innerHTML = `<span class="node-text">${clean(val.name)}</span>`;
            parent.appendChild(a);
          } else {
            const label = document.createElement('div');
            label.className = 'folder-label';
            label.innerText = clean(key);
            parent.appendChild(label);
            const sub = document.createElement('div');
            parent.appendChild(sub);
            build(val, sub);
          }
        });
      }
      build(root, container);
    }
    renderTree();

    const md = document.getElementById('markdown-body');
    md.innerHTML = clean(md.innerHTML)
      .replace(/\[\[(.*?)\]\]/g, (m, c) => {
        let [t, l] = c.split('|'); let target = clean(t.split('#')[0]);
        const f = pages.find(p => clean(p.name) === target);
        return f ? `<a class="wikilink" href="${f.url}">${l || target}</a>` : `<span style="color:#999">[[${c}]]</span>`;
      });
  </script>
</body>
</html>
