<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title | default: page.name | remove: ".md" }} | Hirarchealogy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { 
      --sidebar-width: 310px; --sidebar-peek: 55px; 
      --header-height: 60px; --accent: #800020;  
      --bg-main: #f0ede4; --card-bg: #ffffff;
    }
    * { box-sizing: border-box; }
    body { font-family: "Georgia", "Times New Roman", serif; margin: 0; height: 100vh; background: var(--bg-main); overflow: hidden; }

    /* 开屏层 */
    #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; display: none; align-items: center; justify-content: center; cursor: pointer; transition: 0.8s; background: linear-gradient(135deg, #800020, #1a1a1a); }
    #splash-screen.active { display: flex; }
    #splash-screen.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
    .splash-hint { color: white; font-size: 0.9rem; letter-spacing: 4px; font-family: sans-serif; opacity: 0.7; }

    header { height: 60px; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(128,0,32,0.1); display: flex; align-items: center; padding: 0 30px; z-index: 2000; justify-content: space-between; }
    .header-logo { font-weight: 600; color: var(--accent); font-size: 0.9rem; letter-spacing: 2px; text-decoration: none; }
    .header-nav { display: flex !important; gap: 15px; }
    .header-icon { color: #666; text-decoration: none; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; }
    .header-icon svg { width: 20px; height: 20px; fill: currentColor; }

    .main-wrapper { display: flex; flex-grow: 1; overflow: hidden; position: relative; }

    /* 左右侧栏 */
    #sidebar-container {
      position: absolute; top: 0; left: 0; height: 100%; z-index: 1500; width: var(--sidebar-width);
      transform: translateX(calc(-1 * var(--sidebar-width) + var(--sidebar-peek)));
      transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      background: rgba(100, 0, 20, 0.65);
      mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L15,0 C5,10 5,20 10,30 C20,40 45,45 45,65 C45,85 20,95 15,100 L0,100 Z" fill="black"/></svg>');
      -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L15,0 C5,10 5,20 10,30 C20,40 45,45 45,65 C45,85 20,95 15,100 L0,100 Z" fill="black"/></svg>');
      -webkit-mask-size: 100% 100%;
      display: flex; flex-direction: column; align-items: flex-start; padding-top: 45vh; padding-left: 20px; gap: 20px;
    }
    #sidebar-container:hover { transform: translateX(0); background: rgba(30, 0, 5, 0.98); }
    .nav-item-wrapper { text-decoration: none; color: rgba(255,255,255,0.5); font-size: 32px; font-family: "Songti SC", serif; transition: 0.4s; letter-spacing: 2px; }
    #sidebar-container:hover .nav-item-wrapper { color: white; }

    #right-sidebar-trigger {
      position: absolute; top: 0; right: 0; height: 100%; z-index: 1500; width: 120px;
      transform: translateX(calc(120px - 55px)); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      background: rgba(128, 0, 32, 0.08); 
      mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M100,0 L75,0 C65,5 95,10 90,20 C80,35 25,35 25,45 C25,55 65,55 60,65 C40,80 0,80 0,85 C0,95 50,100 70,100 L100,100 Z" fill="black"/></svg>');
      -webkit-mask-size: 100% 100%;
      cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 100px;
    }
    #right-sidebar-trigger:hover { transform: translateX(0); background: rgba(128, 0, 32, 0.35); }
    .back-text { opacity: 0; transition: 0.8s; font-size: 28px; color: white; font-family: "Songti SC", serif; margin-bottom: 20px; }
    #right-sidebar-trigger:hover .back-text { opacity: 1; }

    /* 【单球仪式】双环锁定，白底 */
    #ritual-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: var(--bg-main); z-index: 1000; }
    .ritual-orb-large { width: 220px; height: 220px; border-radius: 50%; background: #fff; border: 1px solid #e0dbd0; cursor: pointer; transition: 0.5s; display: flex; justify-content: center; align-items: center; }
    #ritual-text { color: var(--accent) !important; font-weight: bold; font-size: 3.5rem; font-family: "Songti SC", serif; }
    .ritual-orb-large.locked { border: 4px double var(--accent); background: #fff; animation: ritual-breath 3s infinite; }
    @keyframes ritual-breath { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    /* 【全局球体系统】1.3.6 核心 */
    .orb-grid { display: flex; justify-content: center; gap: 45px; flex-wrap: wrap; margin-top: 60px; }
    .portal-orb { 
      width: 180px; height: 180px; border-radius: 50%; 
      background: radial-gradient(circle at 30% 30%, #fff, #f8f8f8); border: 1px solid #e0dbd0; 
      display: flex; flex-direction: column; justify-content: center; align-items: center; 
      cursor: pointer; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
      text-decoration: none !important; opacity: 0; transform: translateY(30px); /* 默认隐藏，等待动画 */
    }
    .portal-orb.active-orb { opacity: 1 !important; transform: translateY(0) !important; }
    .portal-orb:hover { background: var(--accent) !important; border-color: transparent !important; box-shadow: 0 30px 60px rgba(128,0,32,0.3); }
    
    .orb-title { color: var(--accent); font-size: 2.4rem; font-family: "Songti SC", serif; transition: 0.4s; pointer-events: none; }
    .portal-orb:hover .orb-title { color: white !important; }
    
    /* 扫选与呼吸灯（全局适用） */
    .portal-orb.scanning { border-color: var(--accent); border-width: 3px; box-shadow: 0 0 30px rgba(128,0,32,0.4); background: #fffcf5; }
    .portal-orb.highlight { border-color: var(--accent); border-width: 2px; animation: orb-breath 3s infinite; }
    @keyframes orb-breath { 0%, 100% { box-shadow: 0 10px 30px rgba(0,0,0,0.05); } 50% { box-shadow: 0 0 50px rgba(128,0,32,0.3); } }

    #content-wrapper { flex-grow: 1; overflow-y: auto; padding: 0 55px; background: var(--bg-main); }
    .container { max-width: 850px; margin: 3rem auto; background: var(--card-bg); padding: 5rem 4rem; box-shadow: 0 20px 80px rgba(0,0,0,0.06); border-radius: 2px; }
    #markdown-body { font-size: 15px; color: #333; line-height: 1.8; }
    #markdown-body h1 { font-size: 1.8rem; color: var(--accent); margin-bottom: 2.5rem; text-align: center; font-family: "Songti SC", serif; }
    
    footer { padding: 4rem 0; text-align: center; color: #aaa; font-size: 0.7rem; letter-spacing: 3px; }
  </style>
</head>
<body>
  <div id="splash-screen"><div class="splash-hint">EXPLORE THE DEPTHS</div></div>
  <div id="ritual-container" style="display:none;"><div class="ritual-orb-large" id="ritual-trigger"><div id="ritual-text">旅</div></div></div>

  <header>
    <a href="{{ site.baseurl }}/" class="header-logo">HIRARCHEALOGY</a>
    <nav class="header-nav">
      <a href="{{ site.baseurl }}/" class="header-icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
      <a href="{{ site.baseurl }}/graph.html" class="header-icon"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17 11c.34 0 .66.08.95.22l2.64-2.64A3.962 3.962 0 0 0 21 5c0-2.21-1.79-4-4-4-2.21 0-4 1.79-4 4 0 .34.08.66.22.95L10.58 8.59a3.96 3.96 0 0 0-1.16-.59V5c0-2.21-1.79-4-4-4S1.42 2.79 1.42 5c0 2.21 1.79 4 4 4 .4 0 .78-.07 1.14-.2l2.66 2.66c-.14.28-.22.6-.22.94s.08.66.22.95l-2.66 2.66a3.96 3.96 0 0 0-1.14-.2c-2.21 0-4 1.79-4 4 0 2.21 1.79 4 4 4 2.21 0 4-1.79 4-4 0-.34-.08-.66-.22-.95l2.64-2.64c.29.14.61.22.95.22 2.21 0 4-1.79 4-4s-1.79-4-4-4zm-8-2c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0 12c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm8-6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0-8c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg></a>
    </nav>
  </header>
  <div class="main-wrapper">
    <div id="right-sidebar-trigger" onclick="window.history.back()"><div class="back-text">回</div></div>
    <div id="sidebar-container">
      <a href="{{ site.baseurl }}/docs/古代旅行/" class="nav-item-wrapper">旅</a>
      <a href="{{ site.baseurl }}/docs/戏/" class="nav-item-wrapper">戏</a>
      <a href="{{ site.baseurl }}/docs/饮/" class="nav-item-wrapper">饮</a>
      <a href="{{ site.baseurl }}/docs/感/" class="nav-item-wrapper">感</a>
    </div>
    <div id="content-wrapper"><main class="container"><div id="markdown-body">{{ content }}</div>
      {% if page.url != "/" and page.url != "/index.html" %}<div id="discovery-section" style="margin-top: 80px; text-align:center;"><div id="discovery-nodes" class="orb-grid" style="gap:25px;"></div></div>{% endif %}
    </main><footer>HIRARCHEALOGY &copy; {{ site.time | date: "%Y" }}</footer></div>
  </div>
  <script>
    function clean(str) { return str ? str.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, "").trim() : ""; }
    const pages = [{% for p in site.pages %}{ "path": {{ p.path | jsonify }}, "url": {{ p.url | relative_url | jsonify }}, "name": "{{ p.name | remove: '.md' }}" },{% endfor %}];
    const isHome = (window.location.pathname.endsWith("/") || window.location.pathname.endsWith("/index.html") || window.location.pathname === "{{ site.baseurl }}/");

    // 统一动画引擎：Stagger & Ritual
    function runOrbRitual() {
      const orbs = document.querySelectorAll('.portal-orb:not(.ritual-orb-large)');
      if (orbs.length === 0) return;
      
      // 1. Stagger 入场
      orbs.forEach((orb, i) => { setTimeout(() => orb.classList.add('active-orb'), i * 100); });
      
      // 2. 如果是索引页，执行闪选锁定
      const isIndex = (orbs.length > 1);
      if (isIndex) {
        let count = 0, currentIdx = -1;
        function tick() {
          if (currentIdx >= 0) orbs[currentIdx].classList.remove('scanning');
          currentIdx = (currentIdx + 1) % orbs.length; orbs[currentIdx].classList.add('scanning');
          if (++count < 6) { setTimeout(tick, 100 + (count * 60)); }
          else { setTimeout(() => { orbs[currentIdx].classList.remove('scanning'); orbs[currentIdx].classList.add('highlight'); }, 150); }
        }
        setTimeout(tick, orbs.length * 100 + 200);
      }
    }

    // 仪式逻辑
    const splash = document.getElementById('splash-screen');
    const ritualCont = document.getElementById('ritual-container');
    const ritualText = document.getElementById('ritual-text');
    const hasSplashed = sessionStorage.getItem('splashed_v7');
    const ritualDone = sessionStorage.getItem('ritual_done_v1.3');

    if (isHome && !hasSplashed) { splash.style.display = 'flex'; } else { splash.style.display = 'none'; }
    splash.onclick = () => {
      splash.classList.add('hidden');
      sessionStorage.setItem('splashed_v7', 'true');
      if (isHome && !ritualDone) startRitual(); else runOrbRitual();
    };

    if (isHome && hasSplashed && !ritualDone) startRitual();
    if ((isHome && hasSplashed && ritualDone) || (!isHome)) { window.onload = runOrbRitual; }

    function startRitual() {
      ritualCont.style.display = 'flex';
      const th = [{char:'旅',url:'{{site.baseurl}}/docs/古代旅行/'},{char:'戏',url:'{{site.baseurl}}/docs/戏/'},{char:'饮',url:'{{site.baseurl}}/docs/饮/'},{char:'感',url:'{{site.baseurl}}/docs/感/'}];
      let ci=0, count=0;
      function run() {
        ritualText.textContent = th[ci%4].char; ci++; count++;
        if (count < 12) { setTimeout(run, 50 + (Math.pow(count, 2) * 2)); }
        else {
          const t = document.getElementById('ritual-trigger'); t.classList.add('locked');
          t.onclick = () => { sessionStorage.setItem('ritual_done_v1.3','true'); window.location.href = th[(ci-1)%4].url; };
        }
      }
      setTimeout(run, 800);
    }

    const md = document.getElementById('markdown-body');
    md.innerHTML = md.innerHTML.replace(/\[\[(.*?)\]\]/g, (m, c) => {
      let [t, l] = c.split('|'); let target = t.split('#')[0].trim();
      const f = pages.find(p => clean(p.name) === clean(target));
      return f ? `<a style="color:var(--accent); text-decoration:none; border-bottom:1px solid rgba(128,0,32,0.2);" href="${f.url}">${l || target}</a>` : `<span style="color:#999">[[${c}]]</span>`;
    });

    if (!isHome) {
      fetch("{{ site.baseurl }}/assets/graph_data.json").then(res => res.json()).then(data => {
        const cn = "{{ page.name | remove: '.md' }}";
        const ns = data.links.filter(l => clean(l.source) === clean(cn) || clean(l.target) === clean(cn)).map(l => clean(l.source) === clean(cn) ? clean(l.target) : clean(l.source));
        const un = [...new Set(ns)]; const cont = document.getElementById('discovery-nodes');
        un.forEach(n => { const f = pages.find(p => clean(p.name) === clean(n)); if (f) { const a = document.createElement('a'); a.href = f.url; a.className = 'portal-orb'; a.style.width="100px"; a.style.height="100px"; a.innerHTML = `<div class="orb-title" style="font-size:1.2rem;">${f.name.charAt(0)}</div>`; cont.appendChild(a); } });
        runOrbRitual(); // 动态生成的球体也跑一遍动画
      });
    }
  </script>
</body>
</html>
