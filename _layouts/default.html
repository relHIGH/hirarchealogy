<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{ page.name | remove: ".md" }} | Hirarchealogy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { 
      --sidebar-width: 310px; 
      --sidebar-peek: 55px; 
      --right-wave-width: 80px;
      --header-height: 60px;
      --primary: #1a1a1a; 
      --accent: #800020;  
      --bg-main: #f0ede4; 
      --card-bg: #ffffff;
    }
    
    * { box-sizing: border-box; }
    body { font-family: "Georgia", "Times New Roman", serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: var(--bg-main); overflow: hidden; }

    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 9999; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.8s cubic-bezier(0.77, 0, 0.175, 1);
      background: linear-gradient(135deg, #800020, #1a1a1a);
    }
    #splash-screen.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
    .splash-hint { color: white; font-size: 0.9rem; letter-spacing: 4px; font-family: sans-serif; opacity: 0.7; }

    header {
      height: 60px; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(128,0,32,0.1); display: flex; align-items: center; padding: 0 30px; z-index: 2500; flex-shrink: 0; justify-content: space-between;
    }
    .header-logo { font-weight: 600; color: var(--accent); font-size: 0.9rem; letter-spacing: 2px; text-decoration: none; }
    .header-nav { display: flex !important; flex-direction: row !important; gap: 15px !important; align-items: center !important; }
    .header-icon { color: #666; text-decoration: none; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; transition: 0.3s; }
    .header-icon:hover { background: var(--bg-main); color: var(--accent); }
    .header-icon.active { background: var(--accent); color: white; }
    .header-icon svg { width: 20px; height: 20px; fill: currentColor; }

    .main-wrapper { display: flex; flex-grow: 1; overflow: hidden; position: relative; }

    #sidebar-container {
      position: absolute; top: 0; left: 0; height: 100%; z-index: 1500;
      width: var(--sidebar-width);
      transform: translateX(calc(-1 * var(--sidebar-width) + var(--sidebar-peek)));
      transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), background 0.8s;
      background: rgba(100, 0, 20, 0.65);
      mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L15,0 C5,10 5,20 10,30 C20,40 45,45 45,65 C45,85 20,95 15,100 L0,100 Z" fill="black"/></svg>');
      -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,0 L15,0 C5,10 5,20 10,30 C20,40 45,45 45,65 C45,85 20,95 15,100 L0,100 Z" fill="black"/></svg>');
      -webkit-mask-size: 100% 100%;
    }
    #sidebar-container:hover { transform: translateX(0); background: rgba(30, 0, 5, 0.98); }
    #sidebar { padding-top: 45vh; padding-left: 20px; padding-right: 40px; display: flex; flex-direction: column; align-items: flex-start; }

    #right-wave {
      position: fixed; top: var(--header-height); right: 0; height: calc(100% - var(--header-height)); 
      width: var(--right-wave-width); background: rgba(128, 0, 32, 0.08); z-index: 100;
      mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M100,0 L85,0 C85,55 0,50 0,75 C0,95 60,100 80,100 L100,100 Z" fill="black"/></svg>');
      -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M100,0 L85,0 C85,55 0,50 0,75 C0,95 60,100 80,100 L100,100 Z" fill="black"/></svg>');
      -webkit-mask-size: 100% 100%; pointer-events: none;
    }

    #content-wrapper { flex-grow: 1; overflow-y: auto; padding: 0 var(--right-wave-width) 0 80px; scroll-behavior: smooth; }
    .container { max-width: 850px; margin: 3rem auto; background: var(--card-bg); padding: 5rem 4rem; box-shadow: 0 20px 80px rgba(0,0,0,0.06); border-radius: 2px; }
    
    #markdown-body { font-size: 15px; color: #333; line-height: 1.8; }
    #markdown-body h1 { font-size: 1.8rem; color: var(--accent); margin-bottom: 2rem; text-align: center; }
    
    .nav-item-wrapper { 
      display: block; padding: 15px 25px; text-decoration: none; 
      color: rgba(255,255,255,0.5); font-size: 28px; font-family: "Songti SC", serif; 
      transition: 0.4s; letter-spacing: 2px;
    }
    .nav-item-wrapper:hover { color: white; transform: scale(1.2); padding-left: 35px; }
    .nav-item-wrapper.active { color: white; font-weight: bold; border-left: 2px solid white; }
    
    /* 首页入口球体 */
    .portal-orb { width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fff, #f8f8f8); border: 1px solid #e0dbd0; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.8s; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-decoration: none !important; }
    .portal-orb:hover { transform: translateY(-20px); background: var(--accent); box-shadow: 0 30px 60px rgba(128,0,32,0.25); }
    .portal-title { color: var(--accent); font-size: 1.3rem; font-weight: 600; letter-spacing: 3px; }
    .portal-orb:hover .portal-title { color: white; }

    footer { padding: 4rem 0; text-align: center; color: #aaa; font-size: 0.7rem; letter-spacing: 3px; }
  </style>
</head>
<body>
  <div id="splash-screen"><div class="splash-hint">EXPLORE THE DEPTHS</div></div>
  <header>
    <a href="{{ site.baseurl }}/" class="header-logo">HIRARCHEALOGY</a>
    <nav class="header-nav">
      <a href="{{ site.baseurl }}/" class="header-icon {% if page.url == '/' %}active{% endif %}" title="Index"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
      <a href="{{ site.baseurl }}/graph.html" class="header-icon {% if page.url contains 'graph' %}active{% endif %}" title="Network"><svg viewBox="0 0 24 24"><path d="M17 11c.34 0 .66.08.95.22l2.64-2.64A3.962 3.962 0 0 0 21 5c0-2.21-1.79-4-4-4-2.21 0-4 1.79-4 4 0 .34.08.66.22.95L10.58 8.59a3.96 3.96 0 0 0-1.16-.59V5c0-2.21-1.79-4-4-4S1.42 2.79 1.42 5c0 2.21 1.79 4 4 4 .4 0 .78-.07 1.14-.2l2.66 2.66c-.14.28-.22.6-.22.94s.08.66.22.95l-2.66 2.66a3.96 3.96 0 0 0-1.14-.2c-2.21 0-4 1.79-4 4 0 2.21 1.79 4 4 4 2.21 0 4-1.79 4-4 0-.34-.08-.66-.22-.95l2.64-2.64c.29.14.61.22.95.22 2.21 0 4-1.79 4-4s-1.79-4-4-4zm-8-2c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0 12c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm8-6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0-8c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg></a>
    </nav>
  </header>
  <div class="main-wrapper">
    <div id="right-wave"></div>
    <div id="sidebar-container">
      <aside id="sidebar">
        <!-- 侧栏仅保留唯一的“旅”入口 -->
        <a href="{{ site.baseurl }}/docs/古代旅行/" class="nav-item-wrapper">旅</a>
      </aside>
    </div>
    <div id="content-wrapper">
      <main class="container">
        <div id="markdown-body">
          {% if page.url != "/" %}<h1>{{ page.name | remove: ".md" }}</h1>{% endif %}
          {{ content }}
        </div>
        {% if page.url != "/" %}
        <div style="margin-top: 60px; padding: 30px; background: #fafafa; border: 1px solid #eee;">
          <div style="font-size: 0.8rem; color: #999; letter-spacing: 2px; margin-bottom: 20px;">CONTINUE DISCOVERY</div>
          <div id="discovery-nodes" style="display:flex; gap:20px; flex-wrap:wrap;"></div>
        </div>
        {% endif %}
      </main>
      <footer>HIRARCHEALOGY &copy; {{ site.time | date: "%Y" }}</footer>
    </div>
  </div>
  <script>
    function clean(str) { return str ? str.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, "").trim() : ""; }
    const pages = [{% for p in site.pages %}{ "path": {{ p.path | jsonify }}, "url": {{ p.url | relative_url | jsonify }}, "name": clean({{ p.name | remove: ".md" | jsonify }}) },{% endfor %}];
    const splash = document.getElementById('splash-screen');
    if (window.location.pathname !== "{{ site.baseurl }}/" && window.location.pathname !== "{{ site.baseurl }}") { splash.style.display = 'none'; }
    splash.onclick = () => { splash.classList.add('hidden'); };

    const md = document.getElementById('markdown-body');
    md.innerHTML = md.innerHTML.replace(/\[\[(.*?)\]\]/g, (m, c) => {
      let [t, l] = c.split('|'); let target = clean(t.split('#')[0]);
      const f = pages.find(p => clean(p.name) === target);
      return f ? `<a style="color:var(--accent); text-decoration:none; border-bottom:1px solid rgba(128,0,32,0.2);" href="${f.url}">${l || target}</a>` : `<span style="color:#999">[[${c}]]</span>`;
    });

    if (window.location.pathname !== "{{ site.baseurl }}/") {
      fetch("{{ site.baseurl }}/assets/graph_data.json").then(res => res.json()).then(data => {
        const cn = clean("{{ page.name | remove: '.md' }}");
        const neighbors = data.links.filter(l => clean(l.source) === cn || clean(l.target) === cn).map(l => clean(l.source) === cn ? clean(l.target) : clean(l.source));
        const un = [...new Set(neighbors)]; const container = document.getElementById('discovery-nodes');
        un.forEach(name => { const found = pages.find(p => clean(p.name) === name); if (found) { const a = document.createElement('a'); a.href = found.url; a.className = 'path-node'; a.innerText = "→ " + found.name; container.appendChild(a); } });
      });
    }
  </script>
</body>
</html>
