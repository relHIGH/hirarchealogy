<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { background: #f0ede4; font-family: "Georgia", serif; margin: 0; padding: 50px; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 80px 60px; box-shadow: 0 20px 80px rgba(0,0,0,0.06); position: relative; }
    #trajectory-line { display: flex; align-items: center; margin-bottom: 30px; margin-top: -55px; opacity: 0.5; font-size: 14px; color: #800020; font-family: "Songti SC", serif; }
    .traj-svg { width: 45px; height: 20px; display: flex; align-items: center; }
    .traj-svg path { fill: none; stroke: #800020; stroke-width: 1.2; stroke-dasharray: 3,3; }
    h1 { color: #800020; text-align: center; font-family: "Songti SC", serif; font-size: 28px; }
    .wiki-link { color: #800020; text-decoration: none; border-bottom: 1px solid rgba(128,0,32,0.2); }
  </style>
</head>
<body>
  <div class="container">
    <div id="trajectory-line">
      <span>旅</span>
      <div class="traj-svg"><svg viewBox="0 0 40 20"><path d="M0,10 L40,10"></path></svg></div>
      <span>行</span>
      <div class="traj-svg"><svg viewBox="0 0 40 20"><path d="M0,10 L40,10"></path></svg></div>
      <span>徒行</span>
    </div>
    <h1>徒行</h1>
    <p>自检：页眉路径汉字无乱码，字号已放大。正文链接：<span class="wiki-link">车</span> 应当变红且带下划线。</p>
  </div>
</body>
</html>
