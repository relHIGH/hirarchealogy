<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { background: #f0ede4; font-family: "Georgia", serif; margin: 0; padding: 50px; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 80px 60px; box-shadow: 0 20px 80px rgba(0,0,0,0.06); position: relative; }
    #trajectory-line { display: flex; align-items: center; margin-bottom: 30px; margin-top: -45px; opacity: 0.5; font-size: 12px; color: #800020; }
    .traj-svg { width: 40px; height: 20px; display: flex; align-items: center; }
    .traj-svg path { fill: none; stroke: #800020; stroke-width: 1; stroke-dasharray: 3,3; }
    h1 { color: #800020; text-align: center; font-family: "Songti SC", serif; font-size: 28px; }
    p { line-height: 1.8; color: #333; }
  </style>
</head>
<body>
  <div class="container">
    <div id="trajectory-line">
      <span>旅</span>
      <div class="traj-svg"><svg viewBox="0 0 40 20"><path d="M0,10 L40,10"></path></svg></div>
      <span>行</span>
      <div class="traj-svg"><svg viewBox="0 0 40 20"><path d="M0,10 L40,10"></path></svg></div>
      <span>徒行</span>
    </div>
    <h1>徒行</h1>
    <p>定义：凭借双足完成的远距离位移...</p>
  </div>
</body>
</html>
