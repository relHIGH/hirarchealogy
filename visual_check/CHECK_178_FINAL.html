<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { background: #f0ede4; margin: 0; font-family: "Georgia", serif; }
    header { height: 60px; background: white; display: flex; align-items: center; padding: 0 30px; justify-content: space-between; }
    .container { max-width: 800px; margin: 50px auto; background: white; padding: 80px 60px; box-shadow: 0 20px 80px rgba(0,0,0,0.06); position: relative; }
    #trajectory-line { display: flex; align-items: center; margin-top: -55px; margin-bottom: 30px; }
    .traj-svg path { fill: none; stroke: #800020; stroke-width: 1.2; stroke-dasharray: 3,3; }
    .portal-orb { 
      width: 150px; height: 150px; border-radius: 50%; background: #ffffff; 
      border: 1px solid rgba(128,0,32,0.15); /* 红色描边 */
      display: flex; align-items: center; justify-content: center; color: #800020; font-family: "Songti SC", serif; font-size: 24px; 
      box-shadow: 0 10px 30px rgba(128,0,32,0.05); /* 红色阴影 */
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="trajectory-line">
      <span style="color:#800020; font-family:'Songti SC';">旅</span>
      <div style="width:45px; height:6px; display:flex; align-items:center; margin:0 5px;"><svg viewBox="0 0 45 6"><path d="M0,3 L45,3" style="stroke:#800020; stroke-width:1.2; stroke-dasharray:3,3; fill:none;"></path></svg></div>
      <span style="color:#800020; font-family:'Songti SC';">行</span>
    </div>
    <div style="display:flex; justify-content:center; gap:20px; margin-top:40px;">
      <div class="portal-orb">旅</div>
      <div class="portal-orb" style="border: 3px solid #800020; box-shadow: 0 0 30px rgba(128,0,32,0.4);">戏</div> <!-- 模拟扫选锁定 -->
    </div>
  </div>
</body>
</html>
