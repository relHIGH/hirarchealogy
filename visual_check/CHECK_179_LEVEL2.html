<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { background: #f0ede4; margin: 0; font-family: "Georgia", serif; }
    .container { max-width: 800px; margin: 50px auto; background: white; padding: 80px 60px; position: relative; }
    #trajectory-line { display: flex; align-items: center; margin-top: -55px; margin-bottom: 30px; }
    .traj-svg { width: 45px; height: 6px; display: flex; align-items: center; margin: 0 5px; }
    .traj-svg path { fill: none; stroke: #800020; stroke-width: 1.2; stroke-dasharray: 3,3; }
    .portal-orb { width: 120px; height: 120px; border-radius: 50%; background: #ffffff; border: 2px solid rgba(128,0,32,0.15); display: flex; align-items: center; justify-content: center; color: #800020; font-family: "Songti SC", serif; font-size: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="trajectory-line">
      <span style="color:#800020;">旅</span>
      <div class="traj-svg"><svg viewBox="0 0 45 6"><path d="M0,3 L45,3"></path></svg></div>
      <span style="color:#800020;">行</span>
      <!-- 末尾无线 -->
    </div>
    <div style="display:flex; justify-content:center; gap:20px; margin-top:40px;">
      <div class="portal-orb">徒</div><div class="portal-orb">车</div>
    </div>
  </div>
</body>
</html>
