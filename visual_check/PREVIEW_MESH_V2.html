<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { background: #f0ede4; font-family: "Georgia", serif; margin: 0; padding: 50px; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 80px 60px; box-shadow: 0 20px 80px rgba(0,0,0,0.06); position: relative; }
    #trajectory-line { display: flex; align-items: center; margin-bottom: 30px; margin-top: -55px; opacity: 0.8; font-size: 14px; color: #800020; font-family: "Songti SC", serif; }
    .traj-dot { width: 4px; height: 4px; background: #800020; border-radius: 50%; margin-right: -2px; }
    .traj-svg { width: 40px; height: 2px; overflow: visible; display: flex; align-items: center; margin: 0 5px; }
    .traj-svg line { stroke: #800020; stroke-width: 1; stroke-dasharray: 3,3; }
    .mesh-line { stroke-dasharray: 1,2 !important; stroke-width: 2 !important; } /* 网状连接线特化 */
    h1 { color: #800020; text-align: center; font-family: "Songti SC", serif; font-size: 28px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="trajectory-line">
      <div class="traj-dot"></div><span>旅</span>
      <div class="traj-svg"><svg width="40" height="2"><line x1="0" y1="1" x2="40" y2="1"></line></svg></div>
      <div class="traj-dot"></div><span>行</span>
      <div class="traj-svg"><svg width="40" height="2"><line x1="0" y1="1" x2="40" y2="1"></line></svg></div>
      <div class="traj-dot"></div><span>徒行</span>
      <!-- 模拟网状跳转节点 -->
      <div class="traj-svg"><svg width="40" height="2"><line x1="0" y1="1" x2="40" y2="1" class="mesh-line"></line></svg></div>
      <div class="traj-dot"></div><span>马</span>
    </div>
    <h1>马</h1>
    <p>自检结论：路径全平直，节点带微圆点，末端无连线，位置拔高放大。</p>
  </div>
</body>
</html>
