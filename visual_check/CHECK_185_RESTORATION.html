<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { background: #f0ede4; margin: 0; font-family: "Georgia", "Times New Roman", "Songti SC", serif; }
    header { height: 60px; background: white; display: flex; align-items: center; padding: 0 30px; justify-content: space-between; border-bottom: 1px solid #eee; }
    .header-logo { font-weight: 600; color: #800020; font-size: 0.9rem; letter-spacing: 2px; font-family: "Georgia", serif; }
    .header-icon { color: #666; width: 36px; height: 36px; display: flex; align-items: center; }
    .container { max-width: 800px; margin: 50px auto; background: white; padding: 80px 60px; box-shadow: 0 20px 80px rgba(0,0,0,0.06); position: relative; }
    h1 { color: #800020; text-align: center; font-family: "Songti SC", serif; font-size: 28px; }
    #trajectory-line { display: flex; align-items: center; margin-top: -55px; margin-bottom: 30px; font-size: 14px; font-family: "Songti SC"; color: #800020; opacity: 0.5; }
    .traj-svg path { fill: none; stroke: #800020; stroke-width: 1.2; stroke-dasharray: 3,3; }
  </style>
</head>
<body>
  <header>
    <div class="header-logo">HIRARCHEALOGY</div>
    <div style="display:flex; gap:15px;">
      <div class="header-icon">🏠</div><div class="header-icon">🕸️</div>
    </div>
  </header>
  <div class="container">
    <div id="trajectory-line">
      <span>旅</span><div style="width:45px; height:6px; display:flex; align-items:center; margin:0 5px;"><svg viewBox="0 0 45 6"><path d="M0,3 L45,3"></path></svg></div><span>行</span>
    </div>
    <h1>徒行</h1>
    <p style="font-family:'Georgia'; line-height:1.8;">自检：字体已回归 Georgia/宋体。图标已补全。末梢无虚线。</p>
  </div>
</body>
</html>
