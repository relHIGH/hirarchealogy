<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { background: #f0ede4; font-family: "Georgia", serif; margin: 0; padding: 50px; }
    .container { max-width: 850px; margin: 0 auto; background: white; padding: 80px 60px; box-shadow: 0 20px 80px rgba(0,0,0,0.06); position: relative; }
    #trajectory-line { display: flex; align-items: center; margin-bottom: 30px; margin-top: -55px; opacity: 0.8; font-size: 14px; color: #800020; font-family: "Songti SC", serif; }
    .traj-node-container { display: flex; flex-direction: column; align-items: center; }
    .traj-node { text-decoration: none; color: #800020; padding: 2px 8px; }
    /* 星簇：体现权重 */
    .traj-mesh-dots { display: flex; gap: 3px; margin-top: 2px; }
    .mesh-dot { width: 3px; height: 3px; background: #800020; border-radius: 50%; opacity: 0.4; }
    /* 连线 */
    .traj-svg { width: 45px; height: 6px; overflow: visible; display: flex; align-items: center; margin: 0 5px; }
    .traj-svg path { fill: none; stroke: #800020; stroke-width: 1; stroke-dasharray: 3,3; }
    /* 双线桥：体现网状穿梭 */
    .mesh-link path { stroke-width: 0.8 !important; stroke-dasharray: 1,2 !important; }
  </style>
</head>
<body>
  <div class="container">
    <div id="trajectory-line">
      <!-- 枢纽节点：3个星点 -->
      <div class="traj-node-container">
        <span class="traj-node">旅</span>
        <div class="traj-mesh-dots"><div class="mesh-dot"></div><div class="mesh-dot"></div><div class="mesh-dot"></div></div>
      </div>
      <div class="traj-svg"><svg viewBox="0 0 45 6"><path d="M0,3 L45,3"></path></svg></div>
      <div class="traj-node-container">
        <span class="traj-node">行</span>
        <div class="traj-mesh-dots"><div class="mesh-dot"></div><div class="mesh-dot"></div><div class="mesh-dot"></div></div>
      </div>
      <!-- 网状双线桥 -->
      <div class="traj-svg mesh-link"><svg viewBox="0 0 45 6"><path d="M0,1.5 L45,1.5"></path><path d="M0,4.5 L45,4.5"></path></svg></div>
      <!-- 末梢节点：1个星点 -->
      <div class="traj-node-container">
        <span class="traj-node">马</span>
        <div class="traj-mesh-dots"><div class="mesh-dot"></div></div>
      </div>
    </div>
    <p style="text-align:center; color:#666; margin-top:40px;">自检结论：枢纽节点（旅、行）下方有3点，末梢（马）下方1点。层级间单线，跳跃间双线。</p>
  </div>
</body>
</html>
