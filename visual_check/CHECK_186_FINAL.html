<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { background: #f0ede4; margin: 0; font-family: "Georgia", "Songti SC", serif; }
    header { height: 60px; background: white; display: flex; align-items: center; padding: 0 30px; justify-content: space-between; border-bottom: 1px solid #eee; }
    .header-logo { font-weight: 600; color: #800020; font-size: 0.9rem; letter-spacing: 2px; font-family: "Georgia", serif; }
    .header-icon { color: #666; width: 20px; height: 20px; display: flex; align-items: center; }
    .container { max-width: 800px; margin: 50px auto; background: white; padding: 80px 60px; box-shadow: 0 20px 80px rgba(0,0,0,0.06); position: relative; }
    h1 { color: #800020; text-align: center; font-family: "Songti SC", serif; font-size: 28px; }
    #trajectory-line { display: flex; align-items: center; margin-top: -55px; margin-bottom: 30px; font-size: 14px; font-family: "Songti SC"; color: #800020; opacity: 0.5; }
    .traj-svg path { fill: none; stroke: #800020; stroke-width: 1.2; stroke-dasharray: 3,3; }
    .portal-orb { 
      width: 140px; height: 140px; border-radius: 50%; 
      border: 1.5px solid rgba(128,0,32,0.2); /* 验证精细红边线 */
      background: white; display: flex; align-items: center; justify-content: center; color: #800020; font-family: "Songti SC"; font-size: 24px; 
      box-shadow: 0 10px 30px rgba(128,0,32,0.05); 
    }
  </style>
</head>
<body>
  <header>
    <div class="header-logo">HIRARCHEALOGY</div>
    <div style="display:flex; gap:15px;">
      <!-- 模拟 SVG 图标 -->
      <div class="header-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
      <div class="header-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 11c.34 0 .66.08.95.22l2.64-2.64A3.962 3.962 0 0 0 21 5c0-2.21-1.79-4-4-4-2.21 0-4 1.79-4 4 0 .34.08.66.22.95L10.58 8.59a3.96 3.96 0 0 0-1.16-.59V5c0-2.21-1.79-4-4-4S1.42 2.79 1.42 5c0 2.21 1.79 4 4 4 .4 0 .78-.07 1.14-.2l2.66 2.66c-.14.28-.22.6-.22.94s.08.66.22.95l-2.66 2.66a3.96 3.96 0 0 0-1.14-.2c-2.21 0-4 1.79-4 4 0 2.21 1.79 4 4 4 2.21 0 4-1.79 4-4 0-.34-.08-.66-.22-.95l2.64-2.64c.29.14.61.22.95.22 2.21 0 4-1.79 4-4s-1.79-4-4-4zm-8-2c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0 12c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm8-6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0-8c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg></div>
    </div>
  </header>
  <div class="container">
    <div id="trajectory-line">
      <span>旅</span><div style="width:45px; height:6px; display:flex; align-items:center; margin:0 5px;"><svg viewBox="0 0 45 6"><path d="M0,3 L45,3"></path></svg></div><span>行</span>
    </div>
    <h1>徒行</h1>
    <p style="font-family:'Georgia';">自检：SVG 图标已回归。字体已回归 Georgia/宋体。线宽精细。末梢无线。</p>
  </div>
</body>
</html>
