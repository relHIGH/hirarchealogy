<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { background: #f0ede4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .ritual-seal { 
      width: 200px; height: 200px; background: #fff; border: 4px solid #800020; 
      display: flex; justify-content: center; align-items: center; position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .ritual-seal::after { content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px; border: 1px solid #800020; }
    #ritual-text { color: #800020; font-weight: bold; font-size: 4rem; font-family: "Songti SC", serif; }
  </style>
</head>
<body>
  <div class="ritual-seal"><div id="ritual-text">旅</div></div>
</body>
</html>
