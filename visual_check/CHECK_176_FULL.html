<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { background: #f0ede4; margin: 0; font-family: "Georgia", serif; }
    header { height: 60px; background: white; display: flex; align-items: center; padding: 0 30px; justify-content: space-between; border-bottom: 1px solid #eee; }
    .header-icon { color: #666; width: 30px; height: 30px; display: flex; align-items: center; }
    .container { max-width: 800px; margin: 50px auto; background: white; padding: 80px 60px; box-shadow: 0 20px 80px rgba(0,0,0,0.06); position: relative; }
    #trajectory-line { display: flex; align-items: center; margin-top: -55px; margin-bottom: 30px; opacity: 0.5; font-size: 14px; color: #800020; font-family: "Songti SC", serif; }
    .traj-node-container { display: flex; flex-direction: column; align-items: center; }
    .traj-svg { width: 45px; height: 6px; display: flex; align-items: center; margin: 0 5px; }
    .traj-svg path { fill: none; stroke: #800020; stroke-width: 1; stroke-dasharray: 3,3; }
    .orb-grid { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
    .portal-orb { width: 100px; height: 100px; border-radius: 50%; background: #ffffff; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; color: #800020; font-family: "Songti SC", serif; font-size: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
  </style>
</head>
<body>
  <header>
    <div style="color:#800020; font-weight:bold;">HIRARCHEALOGY</div>
    <nav style="display:flex; gap:10px;">
      <div class="header-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
      <div class="header-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 11c.34 0 .66.08.95.22l2.64-2.64A3.962 3.962 0 0 0 21 5c0-2.21-1.79-4-4-4-2.21 0-4 1.79-4 4 0 .34.08.66.22.95L10.58 8.59a3.96 3.96 0 0 0-1.16-.59V5c0-2.21-1.79-4-4-4S1.42 2.79 1.42 5c0 2.21 1.79 4 4 4 .4 0 .78-.07 1.14-.2l2.66 2.66c-.14.28-.22.6-.22.94s.08.66.22.95l-2.66 2.66a3.96 3.96 0 0 0-1.14-.2c-2.21 0-4 1.79-4 4 0 2.21 1.79 4 4 4 2.21 0 4-1.79 4-4 0-.34-.08-.66-.22-.95l2.64-2.64c.29.14.61.22.95.22 2.21 0 4-1.79 4-4s-1.79-4-4-4zm-8-2c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0 12c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm8-6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0-8c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg></div>
    </nav>
  </header>
  <div class="container">
    <div id="trajectory-line">
      <div class="traj-node-container"><span>旅</span></div>
      <div class="traj-svg"><svg viewBox="0 0 45 6"><path d="M0,3 L45,3"></path></svg></div>
      <div class="traj-node-container"><span>行</span></div>
      <!-- 自检：末尾绝无虚线 -->
    </div>
    <div class="orb-grid">
      <div class="portal-orb">旅</div><div class="portal-orb">戏</div><div class="portal-orb">饮</div><div class="portal-orb">感</div>
    </div>
  </div>
</body>
</html>
