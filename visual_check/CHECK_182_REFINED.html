<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { background: #f0ede4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .portal-orb { 
      width: 180px; height: 180px; border-radius: 50%; background: #ffffff; 
      border: 1.5px solid rgba(128,0,32,0.25); /* 验证精细边框 */
      display: flex; align-items: center; justify-content: center; color: #800020; font-family: "Songti SC", serif; font-size: 32px;
      box-shadow: 0 10px 30px rgba(128,0,32,0.05);
    }
    .orb-scan { border: 3px solid #800020; box-shadow: 0 0 35px rgba(128,0,32,0.4); } /* 验证扫选边框 */
  </style>
</head>
<body>
  <div style="display:flex; gap:40px;">
    <div class="portal-orb">静</div>
    <div class="portal-orb orb-scan">动</div>
  </div>
</body>
</html>
