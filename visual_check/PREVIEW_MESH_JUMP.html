<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    body { background: #f0ede4; font-family: "Georgia", serif; margin: 0; padding: 50px; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 80px 60px; box-shadow: 0 20px 80px rgba(0,0,0,0.06); position: relative; }
    #trajectory-line { display: flex; align-items: center; margin-bottom: 30px; margin-top: -55px; opacity: 0.8; font-size: 14px; color: #800020; font-family: "Songti SC", serif; }
    .traj-svg { width: 45px; height: 20px; display: flex; align-items: center; overflow: visible; }
    .traj-svg path { fill: none; stroke: #800020; stroke-width: 1.2; stroke-dasharray: 3,3; }
    /* 折线样式 */
    .angled-path { d: path("M0,10 L20,10 L40,0"); stroke: #ff4d4d !important; stroke-width: 1.5 !important; }
    h1 { color: #800020; text-align: center; font-family: "Songti SC", serif; font-size: 28px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="trajectory-line">
      <span>旅</span>
      <div class="traj-svg"><svg viewBox="0 0 40 20"><path d="M0,10 L40,10"></path></svg></div>
      <span>行</span>
      <div class="traj-svg"><svg viewBox="0 0 40 20"><path d="M0,10 L40,10"></path></svg></div>
      <span>徒行</span>
      <!-- 模拟折线连接 -->
      <div class="traj-svg"><svg viewBox="0 0 40 20"><path class="angled-path" d="M0,10 L20,10 L40,0"></path></svg></div>
      <span>马</span>
    </div>
    <h1>马</h1>
    <p>自检：上一页路径已保留，最后一段虚线已变为红色加粗折线，代表非线性跳跃行为。</p>
  </div>
</body>
</html>
